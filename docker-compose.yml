version: '3.8'

services:

  # ── MongoDB ──────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: smart-campus-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - smart-campus-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Identity Service (Authentication) ────────────────────────────────────
  identity-service:
    build:
      context: ./RequestServiceModule/IdentityService
      dockerfile: Dockerfile
    container_name: identity-service
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/smart-campus-identity
      JWT_SECRET: super_key
      JWT_REFRESH_SECRET: super_key_refresh
      CORS_ORIGIN: "http://localhost:3000,http://localhost:3001"
    networks:
      - smart-campus-network
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/v1/health', (r) => { if (r.statusCode !== 200) throw new Error(r.statusCode) })"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Identity Service Frontend (React / Vite) ─────────────────────────────
  identity-frontend:
    build:
      context: ./RequestServiceModule/IdentityServiceUI
      dockerfile: Dockerfile
    container_name: identity-service-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
      NODE_ENV: production
    networks:
      - smart-campus-network
    depends_on:
      identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => { if (r.statusCode !== 200) throw new Error(r.statusCode) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ── Booking Service UI (React/Nginx) ──────────────────────────────────────
  booking-frontend:
    build:
      context: ./BookingServiceModule/BookingServiceUI
      dockerfile: Dockerfile
    container_name: booking-service-ui
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      NODE_ENV: production
    networks:
      - smart-campus-network
    depends_on:
      identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  smart-campus-network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
