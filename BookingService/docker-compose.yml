version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Smart Campus Support System — docker-compose.yml
#
# Services started by this file:
#   mongo            — shared MongoDB on port 27017
#   identity-service — Node.js auth service on port 5000
#   booking-service  — Node.js facility booking on port 5002
#
# HOW TO USE:
#   docker-compose up --build        ← first time (builds images)
#   docker-compose up                ← subsequent runs
#   docker-compose down              ← stop everything
#   docker-compose logs -f           ← watch all logs
#   docker-compose logs -f booking-service  ← watch one service
#
# PORTS available on your machine:
#   MongoDB          → localhost:27017
#   Identity Service → http://localhost:5000
#   Booking Service  → http://localhost:5002  (open this in the browser)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: smart-campus-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Identity Service (your groupmate's Node.js service) ──────────────────
  identity-service:
    build:
      # Point this to wherever the IdentityService folder is on your machine.
      # If you put docker-compose.yml in the root of SmartCampusSupportSystem:
      context: ./RequestService(entry)/IdentityService
      dockerfile: Dockerfile
    container_name: identity-service
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Inside Docker, services talk to each other by container name, not localhost
      MONGO_URI: mongodb://mongo:27017/smart-campus-identity
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: super_key
      JWT_REFRESH_SECRET: super_key_refresh
      CORS_ORIGIN: "http://localhost:5002,http://localhost:3000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/v1/health', (r) => { if (r.statusCode !== 200) throw new Error(r.statusCode) })"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Booking Service (this project) ───────────────────────────────────────
  booking-service:
    build:
      context: ./BookingService
      dockerfile: Dockerfile
    container_name: booking-service
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      MONGO_URI: mongodb://mongo:27017/campus_booking
      PORT: 5002
      NODE_ENV: production
      # Inside Docker, use container names instead of localhost
      IDENTITY_SERVICE_URL: http://identity-service:5000
      NOTIFICATION_SERVICE_URL: http://notification-service:5003
    depends_on:
      mongo:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5002/api/v1/health', (r) => { if (r.statusCode !== 200) throw new Error(r.statusCode) })"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongo_data:
    driver: local
